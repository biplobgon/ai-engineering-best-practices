[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-engineering-best-practices"
version = "0.1.0"
description = "Production-grade handbook for modern AI engineering"
requires-python = ">=3.12"

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".git", "__pycache__", ".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "W503"]

[tool.ruff.lint.isort]
known-first-party = ["core"]
lines-after-imports = 2

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
testpaths = ["tests", "core"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
    "requires_api: marks tests requiring real API keys",
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
