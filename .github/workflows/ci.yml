name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff
        run: uv run ruff check .

      - name: Run black (check)
        run: uv run black --check .

      - name: Run mypy
        run: uv run mypy core/

      - name: Check import boundaries (core only)
        run: |
          echo "Checking that non-core modules don't import SDK directly..."
          ! grep -r "from openai import\|from anthropic import\|import openai\|import anthropic" \
            --include="*.py" fundamentals/ prompt_engineering/ rag/ agents/ multi_agent/ \
            evaluation/ deployment/ 2>/dev/null || exit 1

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pytest (fast tests only)
        run: uv run pytest -v tests/ core/ -m "not slow and not requires_api" --tb=short

      - name: Generate coverage report
        run: uv run pytest --cov=core --cov-report=xml tests/ core/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aiengineer:ci

  eval-gate:
    name: Eval Gate (Placeholder)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Placeholder for eval-gate
        run: |
          echo "Eval gate CI check — will be activated in Phase 6"
          echo "This will run LLM-as-judge regression tests"
          exit 0
